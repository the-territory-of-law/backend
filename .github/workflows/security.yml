name: Security

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  codeql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  python-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.18"
          enable-cache: true

      - name: Install dependencies and scanners
        run: uv sync --frozen

      - name: Bandit static security scan
        run: uv run --with bandit bandit -r app -ll

      - name: Export locked requirements
        run: uv export --frozen --no-dev --no-emit-project --format requirements.txt --output-file requirements.txt

      - name: Dependency vulnerability scan
        run: uv run --with pip-audit pip-audit -r requirements.txt
