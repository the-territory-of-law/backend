name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.18"
          enable-cache: true

      - name: Check lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

      - name: Build Docker image
        run: docker build --pull --tag backend:ci .
