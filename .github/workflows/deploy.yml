name: Build and Deploy Backend

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ${{ vars.GHCR_IMAGE }}
  INFRA_REPO: ${{ vars.INFRA_REPO }}
  INFRA_WORKFLOW_FILE: deploy-infra.yml
  INFRA_REF: main

jobs:
  build:
    name: Build and push backend image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:latest

  deploy:
    name: Trigger infra deploy
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Trigger infra workflow
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ env.INFRA_REPO }}/actions/workflows/${{ env.INFRA_WORKFLOW_FILE }}/dispatches" \
            -d '{
              "ref": "${{ env.INFRA_REF }}",
              "inputs": {
                "environment": "production",
                "service": "backend",
                "image_tag": "${{ needs.build.outputs.image_tag }}"
              }
            }'